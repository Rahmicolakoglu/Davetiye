<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Zarf Animasyonu</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1e1e1e;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .scene {
      perspective: 1000px;
    }

    .envelope {
      width: 250px;
      height: 150px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s;
      cursor: pointer;
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      
    }

    .back {
      background: url(Ön.png) center/cover no-repeat;
    }

    .front {
      background: url(Arka.png) center/cover no-repeat;
      transform: rotateY(180deg);
    }

    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      background: url(duvar\ kağıdı.png) center/cover no-repeat;
      transform-origin: top;
      transition: transform 0.6s;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
    }

    .open .flap {
      transform: rotateX(180deg);
    }

    .flip {
      transform: rotateY(180deg);
    }

    /* FOTOĞRAF */
    #foto {
      position: absolute;
      top: -80px;
      left: -70px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 10px;
      height: 300%;
      width: 160%;
      z-index: 10;
    }

    /* BÜYÜME ANİMASYONU */
    .show-photo #foto {
      
      opacity: 1;
      transform: rotateY(180deg);
      
    }

  </style>
</head>
<body>

<div class="scene">
  <div class="envelope" id="envelope">

    <!-- FOTOĞRAF -->
    <img id="foto" src="Ton Motors.png">

    <div class="face back"></div>
    <div class="face front">
      <div class="flap"></div>
      
    </div>
  </div>
</div>

<script>
  const envelope = document.getElementById("envelope");
  let state = 0;

  envelope.addEventListener("click", () => {
    state++;

    if (state === 1) {
      envelope.classList.add("flip");

    } else if (state === 2) {
      envelope.classList.add("open");

    } else if (state === 3) {
      envelope.classList.add("show-photo"); // FOTOĞRAF ÇIKAR

    } else {
      state = 0;
      envelope.classList.remove("flip", "open", "show-photo");
    }
  });
</script>

</body>
</html>
